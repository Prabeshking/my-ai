<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Chatbot</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f172a; --muted:#1f2937; --accent:#2563eb;
      --text:#e6edf3; --text-dim:#a8b3cf;
    }
    *{box-sizing:border-box}
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background:var(--bg); color:var(--text); }
    .app { max-width: 860px; margin: 0 auto; padding: 16px; }
    .header { font-size: 22px; font-weight: 800; margin: 8px 0 16px; display:flex; gap:10px; align-items:center }
    .badge{font-size:12px; padding:4px 8px; border:1px solid var(--muted); border-radius:999px; color:var(--text-dim)}
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom: 10px; }
    .chat { background: var(--card); border: 1px solid var(--muted); border-radius: 16px; padding: 16px; min-height: 60vh; display:flex; flex-direction:column; gap: 12px; overflow:auto }
    .msg { padding: 10px 12px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #1e293b; align-self: flex-end; }
    .bot { background: #111827; border: 1px solid #374151; }
    .controls { display:flex; gap:8px; margin-top: 12px; }
    textarea { flex: 1; background:#0b1324; color:var(--text); border:1px solid #32425a; border-radius: 12px; padding:12px; min-height: 64px; resize: vertical; }
    button { background:var(--accent); color:white; border:none; padding:12px 14px; border-radius:12px; cursor:pointer; font-weight:700; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    select { background:#0b1324; color:var(--text); border:1px solid #32425a; border-radius:12px; padding:8px; }
    .note { font-size: 12px; color:var(--text-dim); margin-top: 6px;}
    .footer{margin-top:10px; font-size:12px; color:var(--text-dim)}
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      🤖 My AI Chatbot
      <span class="badge">Runs 100% in your browser (WebGPU)</span>
    </div>

    <div class="row">
      <label for="model">Model:</label>
      <select id="model">
        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B (fast)</option>
        <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC">Phi-3 Mini 4K (accurate)</option>
      </select>
      <button id="loadBtn">Load model</button>
      <span id="status" class="note"></span>
    </div>

    <div id="chat" class="chat"></div>

    <div class="controls">
      <textarea id="input" placeholder="Type your message..."></textarea>
      <button id="sendBtn" disabled>Send</button>
    </div>
    <div class="note">First load takes 20–60s (downloads model). Future loads are instant.</div>
    <div class="footer">Privacy: Everything runs in your browser. Nothing is uploaded.</div>
  </div>

  <!-- WebLLM (from CDN) -->
  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const loadBtn = document.getElementById('loadBtn');
    const modelSel = document.getElementById('model');
    const statusEl = document.getElementById('status');

    let engine = null;
    let convo = null;
    let loading = false;
    let generating = false;

    const appendMsg = (text, role) => {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    };

    const setStatus = (txt) => statusEl.textContent = txt ?? "";

    loadBtn.onclick = async () => {
      if (loading) return;
      loading = true;
      setStatus('Loading model…');
      sendBtn.disabled = true;

      try {
        engine = await webllm.createEngine({
          model: modelSel.value,
          chatOptions: { temperature: 0.3, maxTokens: 256 }
        });

        convo = new webllm.ChatCompletion(engine);
        setStatus('Model ready ✅');
        sendBtn.disabled = false;
      } catch (e) {
        console.error(e);
        setStatus('Model failed to load. Try the other model.');
      } finally {
        loading = false;
      }
    };

    const send = async () => {
      if (!engine || generating) return;

      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      appendMsg(text, 'user');

      generating = true;
      sendBtn.disabled = true;

      try {
        let reply = '';
        const stream = await convo.chat({
          messages: [
            { role: 'system', content: 'You are a friendly assistant.' },
            { role: 'user', content: text }
          ],
          stream: true
        });

        let live = null;
        for await (const part of stream) {
          if (part.choices?.[0]?.delta?.content) {
            const chunk = part.choices[0].delta.content;
            reply += chunk;

            if (!live) live = appendMsg('', 'bot');
            live.textContent = reply;
          }
          chatEl.scrollTop = chatEl.scrollHeight;
        }
      } catch (e) {
        appendMsg('Error generating response.', 'bot');
      } finally {
        generating = false;
        sendBtn.disabled = false;
      }
    };

    sendBtn.onclick = send;

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>
</html>
