<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Chatbot</title>
<style>
  body { margin:0; background:#0b1120; color:white; font-family:sans-serif; }
  .box { max-width:850px; margin:0 auto; padding:20px; }
  h1 { font-size:26px; margin-bottom:10px; }
  #chat { background:#111827; border:1px solid #2b3648; padding:16px; border-radius:16px; height:70vh; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .msg { padding:12px 14px; border-radius:12px; line-height:1.5; white-space:pre-wrap; }
  .user { background:#1e293b; align-self:flex-end; }
  .bot  { background:#0f172a; border:1px solid #374151; }
  .controls { margin-top:12px; display:flex; gap:8px; }
  textarea { flex:1; padding:12px; border-radius:10px; border:none; background:#0b1324; color:white; resize:vertical; min-height:60px; }
  button { padding:12px 20px; border-radius:10px; border:none; background:#2563eb; color:white; font-weight:bold; cursor:pointer; }
  #status { font-size:12px; opacity:.8; margin-top:6px; }
</style>
</head>
<body>
<div class="box">
  <h1>AI Chatbot</h1>
  <div id="status">Loading AI model… please wait</div>

  <div id="chat"></div>

  <div class="controls">
    <textarea id="input" placeholder="Type a message..."></textarea>
    <button id="send" disabled>Send</button>
  </div>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");
const status = document.getElementById("status");

let engine = null;
let convo = null;

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function loadModel() {
  status.innerHTML = "Loading AI model… this may take 20–60 seconds ⏳";

  try {
    engine = await webllm.createEngine({
      model: "Phi-3-mini-4k-instruct-q4f16_1-MLC",
      chatOptions: { temperature: 0.3, maxTokens: 200 }
    });
    
    convo = new webllm.ChatCompletion(engine);
    status.textContent = "Model ready! 🎉 You can start chatting.";
    send.disabled = false;

    addMsg("Hello! I’m your AI assistant. How can I help you today?", "bot");

  } catch (err) {
    console.error(err);
    status.textContent = "Failed to load the AI model. Try refreshing the page.";
  }
}

async function handleSend() {
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  addMsg(text, "user");

  let reply = "";
  const stream = await convo.chat({
    messages: [
      { role: "system", content: "You are a helpful, friendly assistant." },
      { role: "user", content: text }
    ],
    stream: true
  });

  const botBubble = document.createElement("div");
  botBubble.className = "msg bot";
  chat.appendChild(botBubble);

  for await (const part of stream) {
    const chunk = part?.choices?.[0]?.delta?.content ?? "";
    reply += chunk;
    botBubble.textContent = reply;
    chat.scrollTop = chat.scrollHeight;
  }
}

send.onclick = handleSend;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

loadModel();
</script>
</body>
</html>
